name: Kubernetes CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - run: npm install

    - run: npm test

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/train-schedule:latest .

    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/train-schedule:latest

  deploy-staging:

    needs: build

    runs-on: ubuntu-latest

    environment: staging

    steps:

    - uses: actions/checkout@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

    - name: Replace Image
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}|g" k8s/deployment.yaml

    - name: Deploy
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/train-schedule -n train-schedule

  deploy-production:

    needs: deploy-staging

    runs-on: ubuntu-latest

    environment: production

    steps:

    - uses: actions/checkout@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

    - name: Replace Image
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}|g" k8s/deployment.yaml

    - name: Deploy
      run: |
        kubectl apply -f k8s/deployment.yaml

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/train-schedule -n train-schedule
