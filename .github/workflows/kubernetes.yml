name: Kubernetes CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install Dependencies
      run: npm install

    - name: Run Unit Tests
      run: npm test

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/train-schedule:latest .

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/train-schedule:latest

    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: latest

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    - name: Replace Docker Image
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}|g" k8s/deployment.yaml

    - name: Create Namespace
      run: |
        kubectl apply -f k8s/namespace.yaml

    - name: Deploy Application
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/train-schedule \
        -n train-schedule \
        --timeout=300s

    - name: Verify Pods
      run: |
        kubectl get pods -n train-schedule

    - name: Verify Service
      run: |
        kubectl get svc -n train-schedule
