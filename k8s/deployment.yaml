apiVersion: apps/v1
kind: Deployment

metadata:
  name: train-schedule
  namespace: train-schedule

spec:
  replicas: 2

  selector:
    matchLabels:
      app: train-schedule

  template:

    metadata:
      labels:
        app: train-schedule

    spec:

      containers:

      - name: train-schedule

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:

        - containerPort: 3000

        readinessProbe:

          httpGet:
            path: /
            port: 3000

          initialDelaySeconds: 10

          periodSeconds: 5

        livenessProbe:

          httpGet:
            path: /
            port: 3000

          initialDelaySeconds: 20

          periodSeconds: 10
